type: border
uplink_ports: ['swp59', 'swp60', 'swp61', 'swp62']
peerlink_ports: ['swp63', 'swp64']
mlag_peer_vlan: 4094
asn_mode: 'unique'
bgp_base_asn: 65000

access_connections:
  - port: swp1
    vlan: 10
  - port: swp2
    vlan: 20

external_peering:
  - port: swp3
    name: bond-fw01
    peering_configs:
      - vlan: 101
        vrf: RED
        fw_vip: 192.168.101.254/24
      - vlan: 102
        vrf: BLUE
        fw_vip: 192.168.102.254/24

  - port: swp4
    name: bond-fw02
    peering_configs:
      - vlan: 101
        vrf: RED
        fw_vip: 192.168.101.254/24
      - vlan: 102
        vrf: BLUE
        fw_vip: 192.168.102.254/24
