---
- name: Deploy Keepalived High Availability
  hosts: fws
  become: yes
  tasks:
    - name: Install keepalived package
      ansible.builtin.apt:
        name: keepalived
        state: present
        update_cache: yes

    - name: Push keepalived configuration
      ansible.builtin.template:
        src: ../templates/keepalived.conf.j2
        dest: /etc/keepalived/keepalived.conf
        owner: root
        group: root
        mode: '0644'
      register: keepalived_config

    - name: Restart keepalived service
      ansible.builtin.service:
        name: keepalived
        state: restarted
      when: keepalived_config.changed

    - name: Ensure keepalived is started and enabled
      ansible.builtin.service:
        name: keepalived
        state: started
        enabled: yes
